upstream rockthecards_app {
    server 127.0.0.1:3030;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    server_name rockthecards.com www.rockthecards.com test.rockthecards.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name rockthecards.com www.rockthecards.com test.rockthecards.com;

    ssl_certificate /etc/letsencrypt/live/rockthecards.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rockthecards.com/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://rockthecards_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
